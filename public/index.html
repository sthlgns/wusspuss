<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>WussPuss</title>
<meta name="description" content="A black cat lives here." />
<link rel="icon" href="data:," />

<!-- Quiet, restrained type pairing: a soft serif for the cat's own words (feels spoken/thought,
     not typed-by-software), a plain low-key sans for everything structural (name, input, hints). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- The whole experience lives in one still, dim room with a single lamp. No header, no chrome, no nav. -->
  <main class="stage" id="stage">

    <h1 class="name" id="nameLabel">WussPuss</h1>

    <!-- The scene: a streetlamp beside the cat, a cone of warm light falling across it,
         and the cat sitting in that pool of light on the same ground line as the lamp's base. -->
    <div class="scene" id="scene">

      <!-- Ground line: the one shared baseline that the lamp's base and the cat's
           shadow both sit on, so nothing floats independently of anything else. -->
      <div class="ground" aria-hidden="true"></div>

      <!-- Light cone — anchored to the lamp head's exact position, widening as it
           falls to the ground. Pure CSS gradient, no image, so it scales cleanly. -->
      <div class="light-cone" aria-hidden="true"></div>

      <!-- Streetlamp: tall straight post + angled flat head, modeled on a real
           streetlamp silhouette — light spills downward from the underside of
           the head, not from a round bulb on a curved arm. -->
      <svg class="lamp" id="lampSvg" viewBox="0 0 100 400" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
        <defs>
          <radialGradient id="bulbGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffe9b8" stop-opacity="0.9" />
            <stop offset="40%" stop-color="#ffd98a" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#ffd98a" stop-opacity="0" />
          </radialGradient>
        </defs>

        <!-- glow halo at the light source, under the head -->
        <ellipse class="lamp-glow" cx="50" cy="46" rx="40" ry="30" fill="url(#bulbGlow)" />

        <!-- post: tall, thin, straight, planted at the ground line -->
        <rect x="47" y="40" width="6" height="352" fill="var(--lamp-post)" />

        <!-- base plate at the ground -->
        <path d="M34 388 L66 388 L62 396 L38 396 Z" fill="var(--lamp-post)" />

        <!-- lamp head: angled flat fixture jutting slightly to one side, like the reference -->
        <path d="M50 40 L50 30 L78 24 C 83 23, 85 26, 82 29 L52 38 Z" fill="var(--lamp-post)" />

        <!-- light-emitting underside of the head -->
        <ellipse class="lamp-bulb" cx="64" cy="34" rx="14" ry="3.4" fill="#ffe9b8" />
      </svg>

      <!-- The cat. A button semantically (it's clickable / pokeable) but visually just... a cat,
           standing on the same ground line as the lamp, in its pool of light. -->
      <button class="cat-wrap" id="catWrap" aria-label="Poke WussPuss">
        <div class="cat-body" id="catBody">
          <img src="cat.png" alt="" class="cat-img" id="catImg" draggable="false" />
          <!-- Pupil overlays positioned over the source image's eye-white regions, so they can
               move independently for the eye-tracking illusion. -->
          <div class="pupil" id="pupilLeft"></div>
          <div class="pupil" id="pupilRight"></div>
        </div>
        <div class="cat-shadow" aria-hidden="true"></div>
      </button>

    </div>

    <!-- Only ever one line of response visible at a time. No log, no scroll, no stacking. -->
    <div class="response-zone" aria-live="polite">
      <p class="response-line" id="responseLine"></p>
    </div>

    <form class="input-row" id="inputForm" autocomplete="off">
      <input
        type="text"
        id="textInput"
        class="text-input"
        placeholder="say something, or nothing at all"
        maxlength="280"
        aria-label="Speak to WussPuss"
      />
    </form>

  </main>

<script src="app.js"></script>
</body>
</html>
