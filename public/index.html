<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>WussPuss</title>
<meta name="description" content="A black cat lives here." />
<link rel="icon" href="data:," />

<!-- Quiet, restrained type pairing: a soft serif for the cat's own words (feels spoken/thought,
     not typed-by-software), a plain low-key sans for everything structural (name, input, hints). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- The whole experience lives in one still, dim room with a single lamp. No header, no chrome, no nav. -->
  <main class="stage" id="stage">

    <h1 class="name" id="nameLabel">WussPuss</h1>

    <!-- The scene: a streetlamp beside the cat, a cone of warm light falling across it,
         and the cat sitting in that pool of light with a shadow cast away from the lamp. -->
    <div class="scene" id="scene">

      <!-- Light cone — a soft triangular wash of warm light from the lamp's bulb down
           over the cat. Pure CSS gradient, no image, so it scales cleanly. -->
      <div class="light-cone" aria-hidden="true"></div>

      <!-- Streetlamp: post + arm + bulb, all SVG so the glow can be a true radial light
           sitting right at the bulb instead of a separate floating blur. -->
      <svg class="lamp" id="lampSvg" viewBox="0 0 120 360" aria-hidden="true">
        <defs>
          <radialGradient id="bulbGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffe9b8" stop-opacity="0.95" />
            <stop offset="35%" stop-color="#ffd98a" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#ffd98a" stop-opacity="0" />
          </radialGradient>
        </defs>
        <!-- glow halo behind the bulb -->
        <circle class="lamp-glow" cx="60" cy="54" r="46" fill="url(#bulbGlow)" />
        <!-- post -->
        <rect x="56" y="86" width="8" height="266" rx="3" fill="var(--lamp-post)" />
        <!-- base -->
        <path d="M40 350 L80 350 L74 360 L46 360 Z" fill="var(--lamp-post)" />
        <!-- curved arm -->
        <path d="M60 86 C 60 60, 60 40, 84 32" stroke="var(--lamp-post)" stroke-width="7" fill="none" stroke-linecap="round" />
        <!-- lamp housing -->
        <path d="M70 26 L98 26 L92 40 L76 40 Z" fill="var(--lamp-post)" />
        <!-- bulb -->
        <circle class="lamp-bulb" cx="84" cy="33" r="6.5" fill="#ffe9b8" />
      </svg>

      <!-- The cat. A button semantically (it's clickable / pokeable) but visually just... a cat,
           sitting in the lamp's pool of light. -->
      <button class="cat-wrap" id="catWrap" aria-label="Poke WussPuss">
        <div class="cat-shadow" aria-hidden="true"></div>
        <div class="cat-body" id="catBody">
          <img src="cat.png" alt="" class="cat-img" id="catImg" draggable="false" />
          <!-- Pupil overlays positioned over the source image's eye-white regions, so they can
               move independently for the eye-tracking illusion. -->
          <div class="pupil" id="pupilLeft"></div>
          <div class="pupil" id="pupilRight"></div>
        </div>
      </button>

    </div>

    <!-- Only ever one line of response visible at a time. No log, no scroll, no stacking. -->
    <div class="response-zone" aria-live="polite">
      <p class="response-line" id="responseLine"></p>
    </div>

    <form class="input-row" id="inputForm" autocomplete="off">
      <input
        type="text"
        id="textInput"
        class="text-input"
        placeholder="say something, or nothing at all"
        maxlength="280"
        aria-label="Speak to WussPuss"
      />
    </form>

  </main>

<script src="app.js"></script>
</body>
</html>
